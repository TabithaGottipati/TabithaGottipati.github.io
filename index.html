<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tabitha Gottipati Portfolio</title>

<style>
    /* RESET + GLOBAL */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        scroll-behavior: smooth;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        background: #0d1117;
        color: #e6edf3;
        overflow-x: hidden;
        transition: background 0.3s, color 0.3s;
    }

    /* LIGHT MODE */
    body.light {
        background: #f5f5f5;
        color: #111;
    }
    body.light nav {
        background: rgba(255,255,255,0.8);
        border-bottom: 1px solid #ccc;
    }
    body.light .card, 
    body.light .contact-box,
    body.light .project {
        background: #fff;
        border: 1px solid #ddd;
        color: #111;
    }
    body.light h2 {
        color: #0066cc;
    }

    /* NAVIGATION */
    nav {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 20px 10%;
        background: rgba(13, 17, 23, 0.8);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 999;
        border-bottom: 1px solid #1f2937;
    }

    /* Make title and links inline */
    nav div {
        display: flex;
        align-items: center;
    }

    nav a {
        color: inherit;
        margin-left: 20px;
        text-decoration: none;
        font-weight: 500;
        transition: 0.2s;
        line-height: 1;
    }

    nav a:hover {
        color: #58a6ff;
    }

    /* LIGHT/DARK TOGGLE */
    #toggle {
        cursor: pointer;
        padding: 8px 14px;
        border-radius: 8px;
        background: #161b22;
        border: 1px solid #333;
        color: #e6edf3;
        transition: 0.2s;
        margin-left: 20px;
        line-height: 1;
        display: inline-flex;
        align-items: center;
    }
    body.light #toggle {
        background: #ddd;
        color: #111;
        border: 1px solid #aaa;
    }

    /* FLOATING SHAPE */
    #floating-shape {
        position: fixed;
        top: 20%;
        right: 5%;
        width: 120px;
        height: 120px;
        background: linear-gradient(135deg, #00aaff, #0066ff);
        border-radius: 20px;
        filter: drop-shadow(0 0 20px #0088ff);
        transform-style: preserve-3d;
        transition: transform 0.1s linear;
        z-index: 1000;
    }

    /* SECTIONS */
    section {
        padding: 120px 10%;
        border-bottom: 1px solid #1f2937;
    }

    h1, h2 {
        font-weight: 700;
        letter-spacing: 1px;
    }

    h1 {
        font-size: 3.5rem;
        margin-bottom: 20px;
    }

    h2 {
        font-size: 2.2rem;
        margin-bottom: 20px;
        color: #58a6ff;
    }

    p {
        font-size: 1.1rem;
        line-height: 1.7rem;
        max-width: 800px;
        margin-bottom: 20px;
    }

    /* CARDS */
    .card {
        background: #161b22;
        padding: 30px;
        border-radius: 12px;
        margin-top: 20px;
        border: 1px solid #1f2937;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
    }

    /* PROJECT GALLERY */
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
    }

    .project {
        background: #161b22;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid #1f2937;
        transition: 0.3s;
    }

    .project:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
    }

    /* INTERNSHIP TIMELINE */
    .timeline {
        border-left: 3px solid #58a6ff;
        padding-left: 40px;
        margin-left: 100px;
        margin-top: 20px;
        position: relative;
    }

    .timeline-item {
        margin-bottom: 50px;
        position: relative;
        padding-left: 40px;
    }

    /* FIXED DOT ALIGNMENT + GLOW EFFECT */
    .timeline-item::before {
        content: "";
        width: 14px;
        height: 14px;
        background: #58a6ff;
        border-radius: 50%;
        position: absolute;
        left: -43px;
        top: 5px;
        transition: 0.2s ease;
        box-shadow: 0 0 0px #58a6ff;
    }

    .timeline-item:hover::before {
        transform: scale(1.35);
        box-shadow: 0 0 12px #58a6ff;
    }

    /* Dates on left side */
    .internship-date {
        position: absolute;
        left: -180px;
        top: 0;
        width: 150px;
        text-align: right;
        font-size: 0.95rem;
        color: #9aa0a6;
    }

    /* Company logos same height */
    .company-logo {
        height: 60px;
        width: auto;
        margin-bottom: 10px;
    }

    /* CONTACT */
    .contact-box {
        background: #161b22;
        padding: 40px;
        border-radius: 12px;
        border: 1px solid #1f2937;
        max-width: 600px;
    }

    .contact-box a {
        color: #58a6ff;
        text-decoration: none;
        font-size: 1.2rem;
    }

    .contact-box a:hover {
        text-decoration: underline;
    }

    /* RESUME BUTTON */
    .resume-btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 20px;
        background: #0066ff;
        color: white;
        border-radius: 8px;
        text-decoration: none;
        transition: 0.2s;
    }
    .resume-btn:hover {
        background: #004ecc;
    }

    /* FOOTER */
    footer {
        text-align: center;
        padding: 40px;
        color: #8b949e;
        font-size: 0.9rem;
    }
</style>
</head>
