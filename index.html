<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tabitha Gottipati</title>

<style>
/* GLOBAL RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
    scroll-behavior: smooth;
}

body {
    background: #0d1117;
    color: #e6edf3;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
}

/* LIGHT MODE */
body.light {
    background: #f5f5f5;
    color: #111;
}

body.light nav {
    background: rgba(255,255,255,0.8);
    border-bottom: 1px solid #ccc;
}

body.light .hero h1 {
    color: #0066cc;
}

/* NAVIGATION */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 6%;
    background: rgba(13, 17, 23, 0.8);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 999;
    border-bottom: 1px solid #1f2937;
}

nav .logo {
    font-size: 1.3rem;
    font-weight: 700;
}

nav .links {
    display: flex;
    gap: 20px;
    align-items: center;
}

nav a {
    color: inherit;
    text-decoration: none;
    font-weight: 500;
    transition: 0.2s;
}

nav a:hover {
    color: #58a6ff;
}

/* LIGHT/DARK TOGGLE */
#toggle {
    cursor: pointer;
    padding: 8px 14px;
    border-radius: 8px;
    background: #161b22;
    border: 1px solid #333;
    color: #e6edf3;
    transition: 0.2s;
}

body.light #toggle {
    background: #ddd;
    color: #111;
    border: 1px solid #aaa;
}

/* FLOATING SHAPE */
#floating-shape {
    position: fixed;
    top: 25%;
    right: 5%;
    width: 140px;
    height: 140px;
    background: linear-gradient(135deg, #00aaff, #0066ff);
    border-radius: 20px;
    filter: drop-shadow(0 0 20px #0088ff);
    transform-style: preserve-3d;
    transition: transform 0.1s linear;
    z-index: 1000;
}

/* HERO SECTION */
.hero {
    padding: 180px 10% 120px;
    text-align: left;
}

.hero h1 {
    font-size: 3.4rem;
    margin-bottom: 20px;
    color: #58a6ff;
}

.hero p {
    font-size: 1.2rem;
    max-width: 700px;
    line-height: 1.7rem;
    margin-bottom: 30px;
}

.hero .btn {
    display: inline-block;
    padding: 14px 24px;
    background: #0066ff;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-size: 1.1rem;
    transition: 0.2s;
}

.hero .btn:hover {
    background: #004ecc;
}

/* RESPONSIVE */
@media (max-width: 700px) {
    #floating-shape {
        display: none;
    }

    .hero h1 {
        font-size: 2.6rem;
    }

    .hero p {
        font-size: 1.05rem;
    }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">Tabitha Gottipati</div>
    <div class="links">
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="hobbies.html">Hobbies</a>
        <a href="goals.html">Goals</a>
        <button id="toggle">Light/Dark</button>
    </div>
</nav>

<!-- FLOATING SHAPE -->
<div id="floating-shape"></div>

<!-- HERO -->
<section class="hero">
    <h1>Welcome, I'm Tabitha.</h1>
    <p>
        Mechanical engineering student passionate about research, innovation, and solving real‑world problems. 
        Explore my engineering portfolio, learn about my hobbies, or read about my long‑term goals.
    </p>

    <a class="btn" href="portfolio.html">View Engineering Portfolio</a>
</section>

<script>
/* ROTATE SHAPE ON SCROLL */
const shape = document.getElementById("floating-shape");
window.addEventListener("scroll", () => {
    const y = window.scrollY;
    shape.style.transform = `rotateX(${y * 0.25}deg) rotateY(${y * 0.35}deg)`;
});

/* LIGHT/DARK MODE */
document.getElementById("toggle").onclick = () => {
    document.body.classList.toggle("light");
};
</script>

</body>
</html>
